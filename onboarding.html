<style>
  :root {
    --white: #ffffff;
    --bg: #f4f3ef;
    --gold: #c9a84c;
    --gold-hover: #b8943e;
    --gold-pale: #fdf8ec;
    --gold-border: #e8d9a8;
    --text: #1a1916;
    --text-2: #4a4845;
    --text-3: #9a9690;
    --border: #e8e6e0;
    --danger: #c0392b;
    --danger-bg: #fef2f2;
    --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-md);
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 24px;
  }

  .logo-gem {
    width: 9px; height: 9px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .welcome-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .welcome-sub {
    font-size: 0.82rem;
    color: var(--text-3);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .form { display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--text-2);
    letter-spacing: 0.01em;
  }

  .input-wrap { position: relative; }

  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 90px 10px 13px;
    font-family: 'Geist', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .field input:focus { border-color: var(--gold); background: var(--white); }
  .field input::placeholder { color: var(--text-3); }

  .regenerate-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--gold-pale);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    padding: 3px 9px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    transition: all 0.15s;
  }

  .regenerate-btn:hover { background: var(--gold-border); }

  .hint {
    font-size: 0.74rem;
    color: var(--text-3);
    margin-top: 2px;
  }

  .submit-btn {
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 9px;
    padding: 11px;
    font-family: 'Geist', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }

  .submit-btn:hover { background: var(--gold-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.3); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  .error-msg {
    background: var(--danger-bg);
    border: 1px solid #fcd5d5;
    color: var(--danger);
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 0.79rem;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo"><div class="logo-gem"></div>4.0</div>
  <div class="welcome-title">Pick a username</div>
  <div class="welcome-sub">This is how you'll appear to other students. You can change it anytime.</div>

  <div class="form">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="e.g. falcon_4821" maxlength="30">
        <button class="regenerate-btn" onclick="generateUsername()">Shuffle ↺</button>
      </div>
      <div class="hint">Letters, numbers and underscores only</div>
    </div>
    <div class="error-msg" id="error"></div>
    <button class="submit-btn" onclick="saveProfile()">Let's go →</button>
  </div>
</div>

<script>
  const animals = ['falcon','wolf','raven','hawk','lynx','bear','fox','eagle','owl','tiger','panda','cobra','viper','moose','bison'];
  const adjectives = ['swift','dark','bold','quiet','sharp','calm','wild','bright','silent','quick'];

  function generateUsername() {
    const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
    const animal = animals[Math.floor(Math.random() * animals.length)];
    const num = Math.floor(Math.random() * 9000) + 1000;
    document.getElementById('username').value = `${adj}_${animal}_${num}`;
  }

  generateUsername();

  async function saveProfile() {
    const raw = document.getElementById('username').value.trim();
    const username = raw.toLowerCase().replace(/[^a-z0-9_]/g, '');
    const err = document.getElementById('error');
    const btn = document.querySelector('.submit-btn');

    if (!username || username.length < 3) {
      err.textContent = 'Username must be at least 3 characters.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving...';
    err.style.display = 'none';

    const { data: { user } } = await db.auth.getUser();

    if (!user) {
      window.location.href = './index.html';
      return;
    }

    // Check username is not taken
    const { data: existing } = await db.from('profiles').select('id').eq('username', username).maybeSingle();
    if (existing) {
      err.textContent = 'That username is taken — try another or shuffle!';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = "Let's go →";
      return;
    }

    const { error } = await db.from('profiles').upsert({
      id: user.id,
      username: username,
      email: user.email,
      university: 'Memorial University of Newfoundland',
      created_at: new Date().toISOString()
    });

    if (error) {
      err.textContent = 'Something went wrong. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = "Let's go →";
      return;
    }

    window.location.href = './app.html';
  }
</script>
</body>
</html>
