<style>
  :root {
    --white: #ffffff;
    --bg: #f4f3ef;
    --gold: #c9a84c;
    --gold-hover: #b8943e;
    --gold-pale: #fdf8ec;
    --gold-border: #e8d9a8;
    --text: #1a1916;
    --text-2: #4a4845;
    --text-3: #9a9690;
    --border: #e8e6e0;
    --danger: #c0392b;
    --danger-bg: #fef2f2;
    --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    padding: 16px;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow-md);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 6px;
  }
  .logo-gem {
    width: 9px; height: 9px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
    animation: gemPulse 3s ease-in-out infinite;
  }
  @keyframes gemPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
    50% { box-shadow: 0 0 0 5px rgba(201,168,76,0.15); }
  }
  .tagline { font-size: 0.82rem; color: var(--text-3); margin-bottom: 32px; }
  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 8px; border: none; background: none; border-radius: 8px;
    font-family: 'Geist', sans-serif; font-size: 0.82rem; font-weight: 500;
    color: var(--text-3); cursor: pointer; transition: all 0.2s;
  }
  .tab.active {
    background: var(--white); color: var(--text); font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .form { display: flex; flex-direction: column; gap: 14px; animation: fadeUp 0.25s ease both; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.76rem; font-weight: 600; color: var(--text-2); letter-spacing: 0.01em; }
  .field input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; font-family: 'Geist', sans-serif; font-size: 0.85rem;
    color: var(--text); outline: none; transition: all 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus {
    border-color: var(--gold); background: var(--white);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }
  .field input::placeholder { color: var(--text-3); }
  .submit-btn {
    background: var(--gold); color: white; border: none; border-radius: 10px;
    padding: 12px; font-family: 'Geist', sans-serif; font-size: 0.87rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px;
    letter-spacing: 0.01em;
  }
  .submit-btn:hover:not(:disabled) {
    background: var(--gold-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(201,168,76,0.35);
  }
  .submit-btn:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    background: var(--danger-bg); border: 1px solid #fcd5d5; color: var(--danger);
    padding: 9px 12px; border-radius: 8px; font-size: 0.79rem; display: none;
    animation: fadeUp 0.2s ease both;
  }
  .footer-text { text-align: center; font-size: 0.74rem; color: var(--text-3); margin-top: 20px; }

  /* Mobile */
  @media (max-width: 480px) {
    body { align-items: flex-end; padding: 0; background: var(--white); }
    .card {
      border-radius: 24px 24px 0 0;
      padding: 32px 24px 40px;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.08);
      border-bottom: none;
      animation: slideUp 0.4s ease both;
      max-width: 100%;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .field input { font-size: 16px; /* prevents iOS zoom */ }
  }
</style>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-gem"></div>4.0</div>
  <div class="tagline">Study smarter, together.</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login', this)">Sign In</button>
    <button class="tab" onclick="switchTab('signup', this)">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="login-form" class="form">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@domain.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="submit-btn" onclick="login()">Sign In</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signup-form" class="form" style="display:none">
    <div class="field">
      <label>Name</label>
      <input type="text" id="signup-name" placeholder="Alex Kim" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@domain.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>
    <div class="error-msg" id="signup-error"></div>
    <button class="submit-btn" onclick="signup()">Create Account</button>
  </div>

  <div class="footer-text">By continuing you agree to 4.0's Terms of Service</div>
</div>

<script>
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
  }

  async function redirectAfterAuth(userId) {
    const { data: profile } = await db.from('profiles').select('id').eq('id', userId).single();
    window.location.href = profile ? './labs_mockup.html' : './onboarding.html';
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.querySelector('#login-form .submit-btn');
    if (!email || !password) { errorEl.textContent = 'Please fill in all fields.'; errorEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Signing in...'; errorEl.style.display = 'none';
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
      errorEl.textContent = (error.message.toLowerCase().includes('invalid login') || error.message.toLowerCase().includes('invalid credentials'))
        ? 'Incorrect email or password.' : error.message;
      errorEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    } else {
      await redirectAfterAuth(data.user.id);
    }
  }

  async function signup() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const errorEl = document.getElementById('signup-error');
    const btn = document.querySelector('#signup-form .submit-btn');
    if (!name || !email || !password) { errorEl.textContent = 'Please fill in all fields.'; errorEl.style.display = 'block'; return; }
    if (password.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; errorEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Creating account...'; errorEl.style.display = 'none';
    const { data, error } = await db.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) {
      errorEl.textContent = error.message; errorEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create Account';
    } else {
      await redirectAfterAuth(data.user.id);
    }
  }

  db.auth.getSession().then(async ({ data: { session } }) => {
    if (session) await redirectAfterAuth(session.user.id);
  });
</script>
</body>
</html>
